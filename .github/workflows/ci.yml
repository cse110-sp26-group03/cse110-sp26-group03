name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checks repository
        uses: actions/checkout@v4

      - name: Set up Bun (latest version)
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 'latest'

      - name: Install dependencies
        run: bun install

      - name: Run lint
        run: bun run lint

      - name: Run tests
        run: bun run test

      - name: Run prettier
        run: bun run prettier
